name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest-timeout mypy

      - name: Lint with ruff
        run: |
          ruff check . --ignore=E501,E402 --exclude=.git,__pycache__,.pytest_cache,venv,.venv,knowledge_pack

      - name: Type check with mypy (expanded scope)
        continue-on-error: true
        run: |
          mypy runtime evaluation infra apps knowledge

      - name: Run tests
        run: |
          pytest tests/ -q --tb=short --timeout=60
        env:
          LLM_ENABLED: false
          EMBEDDING_FAST_MODE: true

      - name: Verify imports
        run: |
          python -c "
          from apps.api.main import app
          from runtime.agents.orchestrator import MultiAgentEngine
          from runtime.tools.registry import create_default_registry
          from runtime.llm.config import llm_settings
          print('All core imports successful')
          "
