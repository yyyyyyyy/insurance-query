services:
  api:
    build: .
    container_name: insurequery-api
    ports:
      - "8000:8000"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - LLM_ENABLED=${LLM_ENABLED:-true}
      - LLM_INTENT_ENABLED=${LLM_INTENT_ENABLED:-true}
      - LLM_ANSWER_ENABLED=${LLM_ANSWER_ENABLED:-true}
      - LLM_TIMEOUT_SECONDS=${LLM_TIMEOUT_SECONDS:-60}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-2048}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.3}
    env_file:
      - .env
    restart: unless-stopped
    mem_limit: 1g
    cpus: "2.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
